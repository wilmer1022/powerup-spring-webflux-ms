server:
  port: 8080
spring:
  application:
    name: "Authentication"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
      
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080,http://localhost:8081"

adapters:
  r2dbc:
    database: "cy_user"
    host: "localhost"
    port: 5432
    schema: "public"
    username: "myuser"
    password: "mypassword"
    pool:
      initial-size: 12
      max-size: 15
      max-idle-time: 10

security:
  jwt:
    secret-key: "aes_512_key.bin"
    expiration-time: 3600000