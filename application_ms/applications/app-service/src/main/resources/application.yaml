server:
  port: 8081
spring:
  application:
    name: "Application"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080,http://localhost:8081"

adapters:
  r2dbc:
    database: "cy_application"
    host: "localhost"
    port: 5433
    schema: "public"
    username: "myuser"
    password: "mypassword"
    pool:
      initial-size: 12
      max-size: 15
      max-idle-time: 10